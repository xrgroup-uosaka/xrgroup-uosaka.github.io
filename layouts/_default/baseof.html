<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default .Site.Language.Lang }}">
{{ partial "head.html" . }}
<body>
  <a class="skip-link" href="#main">{{ i18n "skipToContent" }}</a>
  {{ partial "header.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <button id="to-top" class="to-top" type="button" aria-label="{{ i18n "backToTop" }}" hidden>↑</button>

  <script>
    /* Language switch: remember the EN/JA choice, then slide the knob to the
       clicked side before navigating so the toggle animation is visible. */
    (function () {
      var box = document.querySelector('.lang');
      if (!box) return;
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      box.addEventListener('click', function (e) {
        var a = e.target.closest('a'); if (!a) return;
        var t = (a.textContent || '').trim().toLowerCase();
        try { localStorage.setItem('preferredLang', t.indexOf('en') === 0 ? 'en' : 'ja'); } catch (_) {}
        if (a.classList.contains('is-active')) { e.preventDefault(); return; }
        if (reduce) return;                       // no animation: navigate immediately
        e.preventDefault();
        var links = [].slice.call(box.querySelectorAll('a'));
        var idx = links.indexOf(a);
        var knob = box.querySelector('.lang-knob');
        for (var i = 0; i < links.length; i++) links[i].classList.toggle('is-active', links[i] === a);
        if (knob) knob.style.transform = 'translateX(' + (idx * 100) + '%)';   // slide to clicked side
        var href = a.getAttribute('href');
        setTimeout(function () { window.location.href = href; }, 170);
      });
    })();
    /* Mobile nav toggle */
    (function () {
      var t = document.querySelector('.nav-toggle'), n = document.getElementById('site-nav');
      if (t && n) t.addEventListener('click', function () {
        var open = n.classList.toggle('is-open');
        t.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
    /* Back to top */
    (function () {
      var b = document.getElementById('to-top'); if (!b) return;
      function toggle() { b.hidden = window.scrollY < 400; }
      window.addEventListener('scroll', toggle, { passive: true });
      b.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
      toggle();
    })();
    /* Reveal on scroll: below-fold sections/cards fade up as they enter view.
       Above-fold items are shown immediately (no hide) so there is no flash. */
    (function () {
      if (!('IntersectionObserver' in window) || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var targets = document.querySelectorAll('.band, .pcard, .news-item, .tl-item');
      if (!targets.length) return;
      var io = new IntersectionObserver(function (es) {
        es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); } });
      }, { threshold: 0.06, rootMargin: '0px 0px -6% 0px' });
      var vh = window.innerHeight;
      targets.forEach(function (t) {
        if (t.getBoundingClientRect().top < vh * 0.9) { t.classList.add('is-in'); return; }
        t.classList.add('reveal'); io.observe(t);
      });
    })();
  </script>
</body>
</html>
